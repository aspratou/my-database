name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # 👇 Node.js 24の警告を消す魔法の呪文
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 👇 あらゆる環境変数のチェックを力技で黙らせるダミー設定
      PUBLIC_CLOUDINARY_CLOUD_NAME: 'dummy'
      PUBLIC_CLOUDINARY_API_KEY: 'dummy'
      CLOUDINARY_SECRET: 'dummy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 👇 Node 24に指定
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4